services:
  - type: web
    name: ai-triage-open-campus
    env: node
    plan: free
    buildCommand: ""
    startCommand: "node server.mjs"
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_SUMMARY_MODEL
        value: gpt-4.1-mini
      - key: OPENAI_TRANSCRIBE_MODEL
        value: gpt-4o-mini-transcribe
